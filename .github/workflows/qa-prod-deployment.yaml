name: Shiksha-Reports-TAG-BASED-DEPLOYMENT

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (qa or prod)"
        required: true
        default: "qa"
      tag:
        description: "Image tag to deploy"
        required: true

jobs:
  deploy:
    name: Deploy shiksha-reports Service
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set TAG
        run: echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate ConfigMap YAML
        run: |
          mkdir -p manifest
          echo "${{ secrets.ENV_FILE_CONTENT }}" | base64 -d > manifest/configmap.yaml

      - name: Update Deployment Manifest
        run: |
          export IMAGE_TAG=${{ github.event.inputs.tag }}
          export ECR_REPOSITORY=${{ secrets.ECR_REPOSITORY }}
          envsubst < manifest/shiksha-report.yaml > manifest/shiksha-reports-service-updated.yaml

          echo "===== FINAL IMAGE ====="
          grep image manifest/shiksha-reports-service-updated.yaml

          if grep -q '${IMAGE_TAG}' manifest/shiksha-reports-service-updated.yaml; then
            echo "ERROR: IMAGE_TAG not replaced"
            exit 1
          fi

          - name: Deploy to AWS EKS
            env:
              AWS_REGION: ${{ secrets.AWS_REGION }}
              EKS_CLUSTER_NAME: ${{ github.event.inputs.environment == 'prod' && secrets.EKS_CLUSTER_NAME_PROD || secrets.EKS_CLUSTER_NAME_QA }}
              NAMESPACE: ${{ github.event.inputs.environment == 'prod' && 'microservices' || 'microservices-qa' }}
            run: |
              aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION
          
              kubectl get ns $NAMESPACE >/dev/null 2>&1 || { echo "Namespace $NAMESPACE does not exist"; exit 1; }
          
              kubectl apply -f manifest/configmap.yaml -n $NAMESPACE
              
              # Scale to 0 first to avoid surge scheduling conflict
              kubectl scale deployment shiksha-reports --replicas=0 -n $NAMESPACE
              kubectl wait --for=delete pod -l app=shiksha-reports -n $NAMESPACE --timeout=60s || true
          
              kubectl apply -f manifest/shiksha-reports-service-updated.yaml -n $NAMESPACE
          
              # Scale back up
              kubectl scale deployment shiksha-reports --replicas=1 -n $NAMESPACE
          
              kubectl rollout status deployment shiksha-reports -n $NAMESPACE --timeout=180s || {
                echo "===== ROLLOUT FAILED - DEBUGGING ====="
                kubectl get pods -n $NAMESPACE -l app=shiksha-reports
                kubectl describe pods -n $NAMESPACE -l app=shiksha-reports
                kubectl get events -n $NAMESPACE --sort-by=.lastTimestamp | tail -20
                exit 1
              }
          
              echo "===== VERIFY DEPLOYED IMAGE ====="
              kubectl get deployment shiksha-reports -n $NAMESPACE \
                -o jsonpath='{.spec.template.spec.containers[*].image}'
              echo ""
              kubectl get pods -n $NAMESPACE -l app=shiksha-reports
          
              echo "===== VERIFY DEPLOYED IMAGE ====="
              kubectl get deployment shiksha-reports -n $NAMESPACE \
                -o jsonpath='{.spec.template.spec.containers[*].image}'
              echo ""
              kubectl get pods -n $NAMESPACE -l app=shiksha-reports
